spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

transaction:
  processing:
    idempotency:
      enabled: true
    duplicate-detection:
      enabled: true
    retry:
      max-attempts: 3
      backoff:
        delay: 1000
        multiplier: 2.0

logging:
  level:
    com.example.transactionservice: DEBUG