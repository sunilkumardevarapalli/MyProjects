spring.application.name=event-gateway
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:gatewaydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.accountService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.accountService.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.accountService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.accountService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.accountService.slowCallDurationThreshold=2s

resilience4j.retry.instances.accountService.maxAttempts=3
resilience4j.retry.instances.accountService.waitDuration=500ms
resilience4j.retry.instances.accountService.intervalFunction.name=exponential
resilience4j.retry.instances.accountService.intervalFunction.exponentialBackoffMultiplier=2.0

# H2 Console (optional)
spring.h2.console.enabled=false

