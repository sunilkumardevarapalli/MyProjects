spring.application.name=account-service
server.port=8081

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:accountdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional)
spring.h2.console.enabled=false

# Sleuth Configuration (Distributed Tracing)
spring.sleuth.traceId128=true
spring.sleuth.propagation.type=w3c,b3
spring.sleuth.sampler.probability=1.0

# Actuator Configuration (Health & Metrics)
management.endpoints.web.exposure.include=health,metrics,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true
management.health.defaults.enabled=true

# JSON Logging
logging.pattern.json={"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","service":"account-service","traceId":"%X{traceId}","spanId":"%X{spanId}","level":"%level","logger":"%logger{36}","message":"%msg"}
